# Copy to config/bot.yml and adjust. Env overrides: COINDCX_BOT_CONFIG path.
#
# Scalping profile: runtime.mode scalper + SMC-CE (smc_confluence) on 5m / 15m.
# Switch back: strategy.name supertrend_profit and uncomment supertrend keys below.
# Set dry_run: false only for live after risk checks.

margin_currency_short_name: USDT

# REST + WS instrument pair codes (e.g. B-SOL_USDT). Run `bin/bot doctor` to list matches.
pairs:
  - B-SOL_USDT
  - B-ETH_USDT
  - B-XRP_USDT
  - B-BTC_USDT

# Approximate INR per USDT for position sizing from INR risk budget
inr_per_usdt: 83.0

# Reference equity in INR — risk clamps and daily loss limit scale from this (no need to retune ₹ amounts).
capital_inr: 1_00_000

risk:
  # Scalping: fewer concurrent positions; raise max_leverage only if your account allows it.
  max_open_positions: 2
  max_leverage: 10
  # Scalper preset also sets these if omitted; explicit here for clarity.
  flatten_on_daily_loss_breach: true
  pause_after_daily_loss_flatten: true
  # Optional (% of capital_inr). Defaults: per-trade 1.5% (when both per_trade_inr_min/max are omitted);
  # clamp floor/ceiling 0.25% / 3%; daily loss halt 3.5%. TUI UTIL = loss vs daily cap, not margin use.
  # per_trade_capital_pct: 1.5
  # per_trade_inr_min_pct_of_capital: 0.25
  # per_trade_inr_max_pct_of_capital: 3.0
  # max_daily_loss_pct_of_capital: 3.5
  # Legacy explicit INR band (omit if using *_pct_of_capital above).
  # per_trade_inr_min: 250
  # per_trade_inr_max: 500
  # max_daily_loss_inr: 1500

strategy:
  # SMC-CE (Pine-parity confluence); relaxed tuning for more frequent entries than strict CHOCH+3.
  name: smc_confluence
  execution_resolution: 5m
  higher_timeframe_resolution: 15m
  stop_distance_pct_for_sizing: 0.012
  # Fraction of price from entry; also closes on opposite SMC signal. Use 0 for TP-off (exit on flip only).
  take_profit_pct: 0.004
  htf_alignment: false
  # Looser CE = more signals (more chop). Tighten min_score / swings if over-trading.
  smc_confluence:
    min_score: 1
    sig_cooldown: 1
    smc_swing: 6
    ms_swing: 6
    tl_pivot_len: 6
    ob_body_pct: 0.15
    ob_expire: 90
    liq_lookback: 18
    liq_wick_pct: 0.25
    poc_zone_pct: 0.35
    sess_liq_pct: 0.18
    tl_retest_pct: 0.22
    vp_bars: 60
    signal_mode: bos_relaxed
    # Flip on opposite SMC only when mark is green vs entry (omit min_gain = flip even when red).
    close_on_opposite_smc: true
    opposite_smc_min_gain_pct: 0

  # --- Supertrend scalper (switch name to supertrend_profit) ---
  # name: supertrend_profit
  # supertrend_atr_period: 10
  # supertrend_multiplier: 3
  # take_profit_pct: 0.004
  # stop_distance_pct_for_sizing: 0.012
  # hwm_giveback:
  #   enabled: false

  # TrendContinuation (switch name to trend_continuation or omit name)
  # ema_fast: 12
  # ema_slow: 26
  # atr_period: 14
  # trend_strength_min: 0.12
  # compression_lookback: 8
  # compression_ratio: 0.65
  # breakout_lookback: 4
  # pullback_ema_tolerance_pct: 0.0025
  # volume_filter: false
  # structure_bars: 0

execution:
  # Merged into every futures `order:` hash; required keys depend on CoinDCX API.
  # See https://docs.coindcx.com/ — adjust for your account (order_type, leverage, etc.).
  order_defaults:
    order_type: market_order
    margin_currency_short_name: USDT

runtime:
  journal_path: ./data/bot_journal.sqlite3
  candle_lookback: 200
  # Scalper preset fills stale/LTP/flatten if you omit them; COINDCX_BOT_MODE=scalper forces preset too.
  mode: scalper
  # Balanced vs API load; use 1–5 only if you accept heavier REST use.
  refresh_candles_seconds: 12
  stale_tick_seconds: 25
  stale_recovery_sleep_seconds: 2
  tui_ltp_poll_seconds: 0.25
  # Max seconds to wait for the WebSocket thread after stop (no Thread#kill — graceful exit only)
  ws_shutdown_join_seconds: 45
  # Paper: no exchange orders. Flip to false only when going live with credentials + risk checks.
  dry_run: true
  # paper: true
  # Verbose strategy line per cycle — COINDCX_STRATEGY_SIGNALS=1 or:
  # log_strategy_signals: true
  # paper_rest_advances_ws_stale_clock: true

# SMC AI TradeSetups: Ollama planner writes validated JSON plans to the journal; tick FSM evaluates LTP vs zones.
# This is NOT regime.ai (TUI narrative) — that lives under regime: ai: when enabled.
smc_setup:
  enabled: true
  planner_enabled: true
  planner_interval_seconds: 120
  planner_reset_state: false
  auto_execute: false
  disable_strategy_entries: false
  gatekeeper_enabled: false
  max_active_setups_per_pair: 2
  sweep_consecutive_ticks: 1
  model: llama3.2:3b
  ollama_base_url: http://127.0.0.1:11434
  timeout_seconds: 90
  temperature: 0.1
  use_retry_middleware: true
  retry_attempts: 3

# Regime/HMM: optional context for TUI + regime_vol_tier. Off by default for scalping (less CPU/REST per cycle).
# Set enabled: true and hmm.enabled: true when you want the strip + persistence under ./data/regime_hmm*.json.
# regime:
#   enabled: true
#   scope: per_pair
#   hmm:
#     enabled: true
#     persistence_path: ./data/regime_hmm.json
#     n_candidates: [3, 4, 5]
#     n_init: 3
#     em_iterations: 35
#     min_train_bars: 80
#     zscore_lookback: 60
#     retrain_every_bars: 0
#   ai:
#     enabled: false
#     include_hmm_context: true
#     mode: tui_narrative
#     model: llama3.2:3b
#     ollama_base_url: http://127.0.0.1:11434
#     timeout_seconds: 90
#     min_interval_seconds: 180
#     bars_per_pair: 24
#     max_pairs: 8
#     temperature: 0.15
#     use_retry_middleware: true
#     retry_attempts: 3

# Paper broker simulation settings (only active when runtime.paper or runtime.dry_run is true).
# The paper broker simulates fills with configurable slippage and fees, persisted to SQLite.
paper:
  slippage_bps: 5
  fee_bps: 4
  db_path: ./data/paper_trading.sqlite3

# CoinDCX-compatible paper exchange (run `bin/paper-exchange` in another shell). When enabled with
# `runtime.dry_run` / `runtime.paper`, the bot uses `OrderGateway` / `AccountGateway` against this
# base URL instead of the in-process `PaperBroker`. Set `COINDCX_API_*` to match the seeded keys.
paper_exchange:
  enabled: true
  api_base_url: http://127.0.0.1:9292
  tick_path: /exchange/v1/paper/simulation/tick

# To use in-process PaperBroker instead, comment the block above and set:
# paper_exchange:
#   enabled: false
