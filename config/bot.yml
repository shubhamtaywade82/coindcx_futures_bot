# Production config: MetaFirstWin (TrendContinuation + SupertrendProfit + SmcConfluence) on SOL/ETH
# Paper mode:       runtime.dry_run: true  (in-process PaperBroker, no exchange calls)
# Live-observe:     runtime.dry_run: false + runtime.place_orders: false
#                   (real WS/candles, strategy signals evaluated, NO orders placed)
# Live trading:     runtime.dry_run: false + runtime.place_orders: true
#                   (ONLY enable after paper validation + risk checks)
#
# Env overrides: COINDCX_BOT_CONFIG, COINDCX_DRY_RUN=0/1, PLACE_ORDER / PLACE_ORDERS=0/1, COINDCX_STRATEGY_SIGNALS=1

margin_currency_short_name: USDT

# REST + WS instrument pair codes (run `bin/bot doctor` to verify).
pairs:
  - B-SOL_USDT
  - B-ETH_USDT

# Approximate INR per USDT — updated by CoinDCX conversions API (fx.ttl_seconds).
inr_per_usdt: 84.0

# Reference equity in INR — all risk % clamps scale from this.
capital_inr: 2_00_000

risk:
  max_open_positions: 4
  max_leverage: 10
  flatten_on_daily_loss_breach: true
  pause_after_daily_loss_flatten: true

  # Per-trade risk: 1.5% of capital = ₹3000. Clamped to [floor, cap] below.
  per_trade_capital_pct: 1.5
  per_trade_inr_min_pct_of_capital: 0.5 # floor ₹1000
  per_trade_inr_max_pct_of_capital: 2.5 # cap  ₹5000

  # Daily loss halt at 3% = ₹6000. Bot flattens all positions and pauses.
  max_daily_loss_pct_of_capital: 3.0

  # Circuit breaker: pause new entries after 3 consecutive losses within 60 min.
  consecutive_loss_limit: 3
  circuit_breaker_cooldown_minutes: 60

strategy:
  name: meta_first_win

  # When false, strategies do not close on the entry risk stop (exchange liquidation / emergency paths still apply).
  exit_on_hard_stop: false

  # Both children share these timeframes (per-child resolutions not yet supported).
  execution_resolution: 15m
  higher_timeframe_resolution: 1h

  # Used for position sizing when child does not supply its own stop_distance_pct.
  stop_distance_pct_for_sizing: 0.015

  # HWM giveback: default off for swing (omit this block). Scalper merges min_peak 25 / giveback 0.5 when
  # runtime.mode: scalper (or COINDCX_BOT_MODE=scalper). To enable on swing, add: hwm_giveback: { enabled: true, ... }
  #
  hwm_giveback:
    enabled: true
    min_peak_usdt: 25
    giveback_pct: 0.5

  meta_first_win:
    # After any close on a pair, block new entries for 5 minutes (prevents oscillation).
    cooldown_seconds_after_close: 300

    # Children evaluated in priority order; first to emit open_long/open_short wins.
    # Exit/trailing delegates back to the child that opened the trade (journal entry_lane).
    children:
      # --- Child 1: TrendContinuation ---
      # Entry: breakout-after-compression OR pullback-to-EMA, confirmed by HTF EMA alignment.
      # Exit:  DynamicTrail (R-multiple tiers) + HWM giveback + trend-flip close.
      - name: trend_continuation
        ema_fast: 12
        ema_slow: 26
        atr_period: 14
        trend_strength_min: 0.15 # slightly above default 0.12 to filter crypto chop
        compression_lookback: 8
        compression_ratio: 0.65
        breakout_lookback: 4
        pullback_ema_tolerance_pct: 0.0025
        structure_bars: 3 # require 3-bar directional structure before entry
        adx_period: 14
        adx_min: 20 # skip entries when ADX < 20 (ranging market)
        volume_filter: false # enable if getting too many false breakouts

      # --- Child 2: SupertrendProfit ---
      # Entry: Supertrend band flip (bearish->bullish or bullish->bearish).
      # Exit:  price HWM trail (+ optional USDT hwm_giveback above) — no fixed TP / no DynamicTrail while hwm_price_trail is on.
      # Fires when TrendContinuation holds (compression not yet resolved, etc.).
      - name: supertrend_profit
        supertrend_atr_period: 10
        supertrend_multiplier: 3
        take_profit_pct: 0 # fixed % TP off — use hwm_price_trail
        stop_distance_pct_for_sizing: 0.015
        hwm_price_trail:
          enabled: true
          activate_gain_pct: 0.15 # trail arms only after +15% favorable move from entry (peak price)
          pullback_from_peak_pct: 0.05 # then exit if price gives back 5% from session peak (HWM for longs)

      # --- Child 3: SmcConfluence ---
      # Entry: CHoCH / BOS + FVG + OB + liquidity sweep confluence score ≥ min_score.
      # Exit:  opposite SMC signal (close_on_opposite_smc) + DynamicTrail + HWM.
      # Lowest priority — fires only when both momentum children hold.
      # Inherits top-level smc_confluence: config block below.
      - name: smc_confluence
        take_profit_pct: 0 # rely on DynamicTrail / opposite-SMC close, not fixed TP
        htf_alignment: true # require HTF EMA alignment before entry

  # --- SmcConfluence shared params ---
  # Inherited by the smc_confluence child via merged_child_config.
  smc_confluence:
    min_score: 3 # minimum confluence conditions met before entry
    sig_cooldown: 5 # bars between repeat signals on same pair
    smc_swing: 6 # swing lookback for CHoCH / BOS detection
    ms_swing: 6 # market structure swing length
    tl_pivot_len: 6 # trendline pivot length
    ob_body_pct: 0.15 # order block: min body / range ratio
    ob_expire: 90 # bars before unmitigated OB expires
    liq_lookback: 18 # liquidity sweep lookback
    liq_wick_pct: 0.25 # min wick / body ratio to qualify as sweep
    poc_zone_pct: 0.35 # volume POC zone half-width %
    sess_liq_pct: 0.18 # session liquidity proximity %
    tl_retest_pct: 0.22 # trendline retest proximity %
    vp_bars: 60 # volume profile lookback bars
    fvg_confluence: true # require FVG overlap for higher-quality OB entries
    premium_discount_lookback: 20 # bars for premium/discount range calculation
    signal_mode: choch_strict # choch_strict | choch_any | bos
    close_on_opposite_smc: true # close long on bearish SMC signal (and vice versa)
    opposite_smc_min_gain_pct: 0 # close on opposite signal regardless of current gain

execution:
  order_defaults:
    order_type: market_order
    margin_currency_short_name: USDT

runtime:
  journal_path: ./data/bot_journal.sqlite3
  candle_lookback: 200

  # swing (default) | scalper — scalper merges faster candles + risk/HWM presets (see lib/coindcx_bot/scalper_profile.rb).
  # Env COINDCX_BOT_MODE=swing forces swing even if this key says scalper.
  mode: swing

  # 30s refresh suits 15m candles; reduces REST load vs scalper preset (12s).
  refresh_candles_seconds: 30
  stale_tick_seconds: 45
  stale_recovery_sleep_seconds: 5

  tui_ltp_poll_seconds: 0.5
  tui_exchange_positions: true
  tui_exchange_positions_refresh_seconds: 30
  tui_exchange_positions_margins: [USDT, INR]

  ws_shutdown_join_seconds: 45

  # Paper mode: in-process PaperBroker, no exchange order/account REST calls.
  dry_run: false

  # Live only (dry_run: false): false = read-only account APIs, NO order placement.
  # Override via env: PLACE_ORDER=0 or PLACE_ORDER=false
  place_orders: false

  # Log every strategy evaluation (holds + signals). Turn off once confirmed working.
  log_strategy_signals: true

# SMC AI setups: Ollama-generated trade-setup plans with FSM evaluator.
# auto_execute: false  → setups inform strategy context only; no automatic position opening
# gatekeeper_enabled: false → smc_confluence child uses its own signal logic, not this planner
# disable_strategy_entries: false → momentum children still fire normally
smc_setup:
  enabled: true
  auto_execute: false
  gatekeeper_enabled: false
  disable_strategy_entries: false
  model: llama3.2:3b
  ollama_base_url: http://127.0.0.1:11434
  timeout_seconds: 90
  poll_interval_seconds: 120
  max_active_setups_per_pair: 3

# Regime: Baum-Welch HMM volatility classification + Ollama narrative + RegimeSizer.
regime:
  enabled: true

  hmm:
    enabled: true
    persistence_path: ./data/regime_hmm.json
    scope: per_pair # independent model per pair
    n_candidates: [3, 4, 5] # HMM state counts to try; best BIC wins
    n_init: 3 # random restarts per candidate
    em_iterations: 35 # Baum-Welch max iterations
    min_train_bars: 80 # skip fit if fewer bars available
    zscore_lookback: 60 # volatility zscore rolling window
    retrain_every_bars: 0 # 0 = retrain every candle refresh cycle

  ai:
    enabled: true
    include_hmm_context: true # inject current HMM tier into Ollama prompt
    mode: tui_narrative # output: TUI narrative strip (not trade gating)
    model: llama3.2:3b
    ollama_base_url: http://127.0.0.1:11434
    timeout_seconds: 90
    min_interval_seconds: 180 # minimum seconds between Ollama calls per pair
    bars_per_pair: 24 # recent bars sent in prompt context
    max_pairs: 8 # cap on concurrent pairs in a single narrative batch
    temperature: 0.15 # low temperature for consistent regime labels
    use_retry_middleware: true
    retry_attempts: 3

  risk:
    enabled: true
    # Above 1.5% daily drawdown → half size. Above 3% → zero (halt enforced by risk manager).
    daily_dd_reduce_pct_of_capital: 1.5
    daily_dd_halt_pct_of_capital: 3.0
    size_reduce_factor: 0.5 # multiplier applied when daily DD exceeds reduce threshold

# FX: CoinDCX conversions API, 60s cache. Set enabled: false to always use inr_per_usdt.
fx:
  enabled: true
  ttl_seconds: 60

# Paper broker simulation settings (only active when runtime.dry_run: true).
paper:
  slippage_bps: 5 # 5 bps market-order slippage per side
  fee_bps: 4 # 4 bps taker fee (CoinDCX futures taker)
  db_path: ./data/paper_trading.sqlite3
  # No simulated working SL/TP orders — exits are strategy-driven (e.g. hwm_price_trail) or engine liquidation handling.
  place_working_stop: false
  place_working_take_profit: false

# In-process PaperBroker when paper_exchange.enabled: false (default).
# When true: run `bin/paper-exchange`; orders/positions REST use api_base_url, while candles/WS/FX stay on CoinDCX production.
paper_exchange:
  enabled: false

# Multi-level analysis alerts: journal +event_log+ rows always; Telegram when COINDCX_TELEGRAM_* are set.
# With filter_telegram: true, delivery is throttled (journal is never dropped).
alerts:
  filter_telegram: true
  analysis:
    strategy_transitions: true # analysis_strategy_transition when strategy action/reason changes (per pair)
    regime_hmm_transitions: true # analysis_regime_change when HMM decoded state/label changes
    regime_ai_updates: true # analysis_regime_ai_update when Ollama regime label or probability jumps enough
    regime_ai_min_probability_delta: 10 # percentage points (vs previous AI payload)
    # Per pair + price rule id: skip further analysis_price_cross journal/Telegram rows while LTP chops the same level.
    price_cross_cooldown_seconds: 300
  telegram:
    default_throttle_seconds: 60
    critical_throttle_seconds: 30
    throttle_by_type:
      analysis_regime_ai_update: 900
      analysis_regime_change: 300
      analysis_strategy_transition: 120
      analysis_price_cross: 180

# Optional Telegram: mirror +event_log+ rows (ENV only — no bot.yml). Off unless both are set:
#   COINDCX_TELEGRAM_BOT_TOKEN  COINDCX_TELEGRAM_CHAT_ID
# Optional second chat: COINDCX_TELEGRAM_OPS_CHAT_ID, COINDCX_TELEGRAM_OPS_BOT_TOKEN (if another bot),
#   COINDCX_TELEGRAM_OPS_TYPES=comma,separated,event_types (default: open_failed,smc_setup_invalidated)
